  <script>
    // Loader fade out
    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('loader').classList.add('hide'), 550);
    });

    lucide.createIcons();

    // Mobile menu
    const menuToggle = document.getElementById('menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu');
    menuToggle.addEventListener('click', () => {
      const open = mobileMenu.classList.toggle('opacity-100');
      mobileMenu.classList.toggle('visible', open);
      mobileMenu.classList.toggle('invisible', !open);
      mobileMenu.classList.toggle('opacity-0', !open);
    });
    mobileMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      mobileMenu.classList.remove('opacity-100','visible');
      mobileMenu.classList.add('opacity-0','invisible');
    }));

    // Reveal on scroll
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold: 0.12 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));

    // Project overlay
    const overlay = document.getElementById('proj-overlay');
    const details = document.querySelectorAll('.proj-detail');
    function openProject(id) {
      details.forEach(d => d.classList.toggle('active', d.dataset.detail === id));
      overlay.classList.add('open');
      overlay.scrollTop = 0;
      document.body.style.overflow = 'hidden';
    }
    function closeProject() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }
    document.querySelectorAll('[data-open]').forEach(btn => btn.addEventListener('click', () => openProject(btn.dataset.open)));
    document.getElementById('proj-close').addEventListener('click', closeProject);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeProject(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeProject(); });

    // Contact form (no persistence — inline confirmation only)
    const form = document.getElementById('contact-form');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = form.querySelector('[data-template-id="contact-submit"]');
      btn.style.opacity = '0.6';
      btn.style.pointerEvents = 'none';
      setTimeout(() => {
        document.getElementById('cf-success').classList.remove('hidden');
        form.querySelector('#cf-name').value = '';
        form.querySelector('#cf-email').value = '';
        form.querySelector('#cf-msg').value = '';
        btn.style.opacity = '';
        btn.style.pointerEvents = '';
      }, 500);
    });

    // Hero neural-network canvas
    const canvas = document.getElementById('hero-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [], w, h;
    function resize() {
      w = canvas.width = canvas.offsetWidth * devicePixelRatio;
      h = canvas.height = canvas.offsetHeight * devicePixelRatio;
    }
    function initParticles() {
      const count = Math.min(90, Math.floor((w * h) / 22000 / devicePixelRatio));
      particles = Array.from({ length: count }, () => ({
        x: Math.random() * w, y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.25 * devicePixelRatio,
        vy: (Math.random() - 0.5) * 0.25 * devicePixelRatio,
        r: (Math.random() * 1.4 + 0.4) * devicePixelRatio
      }));
    }
    function draw() {
      ctx.clearRect(0, 0, w, h);
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > w) p.vx *= -1;
        if (p.y < 0 || p.y > h) p.vy *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.fill();
        for (let j = i + 1; j < particles.length; j++) {
          const q = particles[j];
          const dx = p.x - q.x, dy = p.y - q.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const max = 140 * devicePixelRatio;
          if (dist < max) {
            ctx.beginPath();
            ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
            ctx.strokeStyle = 'rgba(255,255,255,' + (0.12 * (1 - dist / max)) + ')';
            ctx.lineWidth = 0.6 * devicePixelRatio;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(draw);
    }
    function setup() { resize(); initParticles(); }
    window.addEventListener('resize', setup);
    setup();
    draw();
